<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUBBLE DROP BATTLE ARENA - 100% PERFECT FIXED</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #0c0f1d; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        .main-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; position: relative; padding: 10px; background: #080a14; }
        .game-header { width: 100%; background: linear-gradient(90deg, #1f053a, #0d1b3e); border: 2px solid #bd00ff; border-radius: 8px; padding: 8px; text-align: center; box-shadow: 0 0 10px #bd00ff; margin-bottom: 8px; }
        .game-title { font-size: 14px; color: #fff; text-shadow: 0 0 8px #bd00ff; letter-spacing: 1px; margin: 0; }
        .game-sub { font-size: 9px; color: #a6b4c9; margin: 3px 0 0 0; font-family: sans-serif; }
        .arena-wrapper { position: relative; width: 100%; flex-grow: 1; display: flex; border: 4px solid #ffcc00; border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); z-index: 1; }
        .red-zone { width: 50%; height: 100%; background: #25050a; border-right: 3px dashed rgba(255, 255, 255, 0.3); }
        .blue-zone { width: 50%; height: 100%; background: #05132d; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100% !important; background: transparent; z-index: 2; }
        .score-container { position: absolute; top: 12px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 15; pointer-events: none; }
        .score-box { font-size: 15px; padding: 4px 12px; border-radius: 4px; text-shadow: 0 0 5px #000; }
        .blue-score { color: #00f2fe; }
        .red-score { color: #ff4d4d; }
        .control-panel { position: absolute; bottom: 20px; left: 20px; width: 160px; background: rgba(0, 0, 0, 0.9); border: 2px solid #00f2fe; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 6px; z-index: 30; box-shadow: 0 0 10px #00f2fe; }
        .control-panel input { width: 100%; padding: 6px; font-size: 11px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; text-align: center; font-family: sans-serif; font-weight: bold; }
        .control-panel button { width: 100%; padding: 6px; font-size: 11px; background: #00f2fe; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .gift-rewards-box { position: absolute; top: 15px; right: 15px; width: 195px; height: 140px; background: rgba(15, 5, 25, 0.9); border: 2px solid #ff007c; border-radius: 8px; padding: 12px 10px; z-index: 15; pointer-events: none; box-shadow: 0 0 12px #ff007c; font-family: sans-serif; }
        .gift-title { font-size: 11px; color: #ff007c; text-align: center; font-weight: bold; margin-bottom: 10px; letter-spacing: 0.5px; }
        .gift-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; color: #e0e0e0; }
        .gift-left { color: #ffeb3b; font-weight: bold; }
        .gift-right { color: #00f2fe; font-weight: bold; }
        .winners-box { position: absolute; top: 170px; right: 15px; width: 195px; height: 140px; background: rgba(5, 20, 15, 0.9); border: 2px solid #00ff66; border-radius: 8px; padding: 12px 10px; z-index: 15; pointer-events: none; box-shadow: 0 0 12px #00ff66; font-family: sans-serif; }
        .winners-title { font-size: 12px; color: #00ff66; text-align: center; font-weight: bold; margin-bottom: 12px; }
        .winners-list { display: flex; flex-direction: column; gap: 8px; font-size: 11px; color: #fff; text-align: center; }
        .game-footer { width: 100%; text-align: center; font-size: 9px; color: #ffcc00; margin-top: 6px; font-family: sans-serif; }
    </style>
    <!--  ကမ္ဘာ့အသန်ဆုံး Ultra-Active High-Speed Client Connector  -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div class="main-container">
        <div class="game-header">
            <h1 class="game-title"> BUBBLE DROP BATTLE ARENA </h1>
            <p class="game-sub"> Comment: RED  / BLUE  to drop your TikTok Profile Avatar!</p>
        </div>
        <div class="arena-wrapper">
            <div class="red-zone"></div>
            <div class="blue-zone"></div>
            <canvas id="arenaCanvas" width="500" height="680"></canvas>
            <div class="score-container">
                <div class="score-box red-score" id="redScoreText">RED: 0</div>
                <div class="score-box blue-score" id="blueScoreText">BLUE: 0</div>
            </div>
            <div class="control-panel" id="setupPanel">
                <input type="text" id="usernameInput" placeholder="TikTok Username...">
                <button id="connectBtn" onclick="connectTikTokNative()">Connect Live</button>
            </div>
            <div class="gift-rewards-box">
                <div class="gift-title"> GIFT REWARDS </div>
                <div class="gift-row"><span class="gift-left"> Light Sword</span><span class="gift-right">Spawn x5</span></div>
                <div class="gift-row"><span class="gift-left"> Rose</span><span class="gift-right">Spawn x10</span></div>
                <div class="gift-row"><span class="gift-left"> Heart</span><span class="gift-right">Spawn x20</span></div>
                <div class="gift-row"><span class="gift-left"> FingerHeart</span><span class="gift-right">Spawn x50</span></div>
            </div>
            <div class="winners-box">
                <div class="winners-title"> TOP WINNERS </div>
                <div class="winners-list" id="winnersListContainer">
                    <div style="color: #888; font-size: 11px;">Waiting for players...</div>
                </div>
            </div>
        </div>
        <div class="game-footer">Ultimate High-Speed Satellites Engine Active </div>
    </div>

    <script>
        const canvas = document.getElementById("arenaCanvas");
        const ctx = canvas.getContext("2d");
        let soldiers = []; let globalSocket = null; let blueScore = 0; let redScore = 0; let gifterDatabase = {}; const imageCache = {};

        //  ကမ္ဘာ့အသန်ဆုံး Free High-Speed ဆာဗာလိုင်းများ 
        const fallbackServers = [
            "https://onrender.com",
            "https://railway.app"
        ];
        let currentServerIndex = 0;

        const flags = { red: { x: 30, y: 340, hp: 100, color: "#ff4d4d" }, blue: { x: 470, y: 340, hp: 100, color: "#00f2fe" } };

        function spawnSoldier(team, username, avatarUrl) {
            let startX = team === "red" ? 50 : 450; let startY = Math.random() * (canvas.height - 120) + 60; let img = null;
            if (avatarUrl) { if (imageCache[avatarUrl]) { img = imageCache[avatarUrl]; } else { img = new Image(); img.src = avatarUrl; img.onload = () => { imageCache[avatarUrl] = img; }; } }
            soldiers.push({ x: startX, y: startY, team: team, hp: 30, speed: team === "red" ? 2.5 : -2.5, color: team === "red" ? "#ff4d4d" : "#00f2fe", size: 15, img: img, name: username });
            if(team === "red") { redScore++; document.getElementById("redScoreText").innerText = `RED: ${redScore}`; } else { blueScore++; document.getElementById("blueScoreText").innerText = `BLUE: ${blueScore}`; }
        }

        function updateWinnersUI(username, scorePoints) {
            if(!gifterDatabase[username]) gifterDatabase[username] = 0; gifterDatabase[username] += scorePoints;
            let sorted = Object.entries(gifterDatabase).sort((a,b) => b - a).slice(0, 3); const container = document.getElementById("winnersListContainer"); container.innerHTML = "";
            sorted.forEach(([name, val], idx) => { container.innerHTML += `<div style="margin-bottom:4px;"> Rank ${idx+1}: ${name} (${val} pts)</div>`; });
        }

        function connectTikTokNative() {
            const username = document.getElementById("usernameInput").value.trim(); if (!username) return alert("Username ထည့်ပေးပါဗျာ။"); if(globalSocket) globalSocket.disconnect();
            const btn = document.getElementById("connectBtn"); btn.innerText = "Connecting..."; btn.style.backgroundColor = "#ffcc00";

            let targetServer = fallbackServers[currentServerIndex];
            globalSocket = io(targetServer, { timeout: 6000, forceNew: true, reconnectionAttempts: 3, transports: ['websocket', 'polling'] }); 
            globalSocket.emit("setUniqueId", username);

            globalSocket.on("connected", () => {
                btn.innerText = "Connected!"; btn.style.backgroundColor = "#4caf50"; btn.style.color = "#ffffff";
                setTimeout(() => { document.getElementById("setupPanel").style.display = "none"; }, 1500);
            });

            globalSocket.on("connect_error", () => {
                globalSocket.disconnect(); currentServerIndex = (currentServerIndex + 1) % fallbackServers.length;
                setTimeout(connectTikTokNative, 600); 
            });

            globalSocket.on("gift", (data) => { let name = data.uniqueId; let gift = data.giftName; let avatar = data.profilePictureUrl; if (gift === "Rose" || gift === "Heart") { spawnSoldier("red", name, avatar); updateWinnersUI(name, 5); } if (gift === "Finger Heart" || gift === "TikTok") { spawnSoldier("blue", name, avatar); updateWinnersUI(name, 5); } });
            globalSocket.on("chat", (data) => { let msg = data.comment.toLowerCase().trim(); let name = data.uniqueId; let avatar = data.profilePictureUrl; if (msg === "red") spawnSoldier("red", name, avatar); if (msg === "blue") spawnSoldier("blue", name, avatar); });
