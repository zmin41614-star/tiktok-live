<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Interactive Football Game</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background-color: #05140b;
        }

        /*  မြက်ခင်းစိမ်း ဘောလုံးကွင်းပြင် (ဘယ်/ညာ အခြမ်းခွဲထားခြင်း) */
        #game-screen {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(90deg, #1b4d22 50%, #143d1a 50%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* ကွင်းလယ်မျဉ်းဖြူလိုင်း */
        .half-line {
            position: absolute;
            left: 50%; top: 0;
            width: 4px; height: 100%;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        /* အပေါ်က ရမှတ်နှင့် အချိန်ဘုတ် */
        .top-ui {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            z-index: 5;
        }

        .score-board {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .timer {
            font-size: 20px;
            color: #ff9900;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 5px;
        }

        /*  စတင်ချိတ်ဆက်မည့် Setup Box */
        #setup-box {
            position: absolute;
            width: 85%; max-width: 380px;
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #ff9900;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
        }

        .setup-title { font-size: 24px; font-weight: bold; color: #ff9900; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px;
            background: #252525; border: 1px solid #444444;
            border-radius: 8px; color: white; font-size: 16px;
            box-sizing: border-box; margin-bottom: 20px;
        }
        .btn-connect {
            width: 100%; padding: 14px;
            background: linear-gradient(45deg, #ff9900, #ff5500);
            border: none; border-radius: 8px; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /*  အောက်ခြေ CR7 နှင့် Messi တို့၏ ကမ္ဘာကျော်ရုပ်ပုံ Logo (Banners) */
        .bottom-logos {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 35vh;
            display: flex;
            z-index: 2;
            pointer-events: none;
        }

        .logo-section {
            width: 50%; height: 100%;
            background-size: cover;
            background-position: center top;
            opacity: 0.8;
        }

        /* ဘယ်ဘက် ရော်နယ်ဒိုပုံနှင့် ညာဘက် မက်ဆီပုံ */
        .ronaldo-logo {
            background-image: url('https://unsplash.com');
            border-right: 2px solid rgba(255,255,255,0.2);
        }
        .messi-logo {
            background-image: url('https://unsplash.com');
        }

        /*  Gift ပေးသူများ ကွင်းထဲတွင် ပရိုဖိုင်နှင့်အတူ ပေါ်လာမည့် စစ်သည်တော်စနစ် (Players) */
        .player-node {
            position: absolute;
            width: 50px; height: 50px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            z-index: 3;
            transition: all 0.5s linear;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            box-shadow: 0 0 10px rgba(255,255,255,0.6);
        }

        .red-soldier { border: 3px solid #ff3333; }
        .blue-soldier { border: 3px solid #3366ff; }

        .player-name {
            background: rgba(0,0,0,0.7);
            color: white; font-size: 9px;
            padding: 2px 5px; border-radius: 5px;
            white-space: nowrap; margin-bottom: -15px;
        }
    </style>
</head>
<body>

    <!--  Setup Box (ချိတ်ဆက်ရန် နေရာ) -->
    <div id="setup-box">
        <div class="setup-title"> SQUAD WAR LIVE </div>
        <input type="text" id="tiktok-username" value="interactive_game_live">
        <button class="btn-connect" onclick="connectToTikTokLive()">CONNECT & START</button>
    </div>

    <!--  ဂိမ်းကွင်းပြင်ကြီး -->
    <div id="game-screen">
        <div class="half-line"></div>
        
        <div class="top-ui">
            <div class="score-board">
                <span style="color:#ff3333;">RED 0</span> - <span style="color:#3366ff;">0 BLUE</span>
            </div>
            <div class="timer">18:06</div>
        </div>

        <!-- အောက်ခြေ CR7 နှင့် Messi တို့၏ အလှဆင် Logo ကွက်များ -->
        <div class="bottom-logos">
            <div class="logo-section ronaldo-logo"></div>
            <div class="logo-section messi-logo"></div>
        </div>
    </div>

    <script>
        // တိုက်ခိုက်ရေး နောက်ခံအသံဖိုင် (Battle Sound Effect)
        const battleAudio = new Audio('https://google.com');
        battleAudio.loop = true;

        const workerUrl = "https://workers.dev";

        function connectToTikTokLive() {
            const username = document.getElementById('tiktok-username').value.trim();
            const setupBox = document.getElementById('setup-box');

            if (!username) {
                alert('ကျေးဇူးပြု၍ TikTok Username ကို ရိုက်ထည့်ပါ ချစ်ဆုံး။');
                return;
            }

            //  အသံစတင်ဖွင့်ခြင်းနှင့် ဘောက်စ်ဖျောက်ခြင်း
            battleAudio.play().catch(e => console.log("Audio play blocked"));
            setupBox.remove(); 

            // TikTok Live ဒေတာဆွဲယူသည့်စနစ် စတင်လည်ပတ်ခြင်း
            startLiveStreamFetch(username);
        }

        async function startLiveStreamFetch(username) {
            const fetchUrl = `${workerUrl}/im/fetch/?room_id=${username}`;

            setInterval(async () => {
                try {
                    const response = await fetch(fetchUrl);
                    if (response.ok) {
                        const data = await response.json();
                        
                        // အကယ်၍ Live ထဲတွင် Gift (လက်ဆောင်) ပေးသူရှိပါက ကွင်းထဲသို့ စစ်သည်အသစ် ထည့်ပေးခြင်း
                        if(data && data.gift) {
                            spawnSoldier(data.gift.username, data.gift.profileUrl, data.gift.team);
                        }
                    }
                } catch (error) {
                    // စမ်းသပ်ရန်အတွက် Gift ပေးသူပုံစံ အလိုအလျောက် ဖန်တီးပေးခြင်း (TikTok Live မလွှင့်ရသေးမီ စမ်းသပ်နိုင်ရန်)
                    const testTeams = ['red', 'blue'];
                    const randomTeam = testTeams[Math.floor(Math.random() * testTeams.length)];
                    spawnSoldier("User_" + Math.floor(Math.random()*100), "https://w3schools.com", randomTeam);
                }
            }, 3000); // ၃ စက္ကန့်တစ်ကြိမ် အချက်အလက် စစ်ဆေးမည့်စနစ်
        }

        //  Gift ပေးသူ၏ ပရိုဖိုင်ပုံနှင့် နာမည်ဖြင့် ကွင်းထဲတွင် စစ်သည်တော် ပေါ်လာစေမည့် လုပ်ဆောင်ချက်
        function spawnSoldier(name, profileImg, team) {
            const container = document.getElementById('game-screen');
            const soldier = document.createElement('div');
            
            soldier.classList.add('player-node');
            soldier.classList.add(team === 'red' ? 'red-soldier' : 'blue-soldier');
            soldier.style.backgroundImage = `url('${profileImg}')`;

            // ဘယ်ဘက်အခြမ်း (Red) သို့မဟုတ် ညာဘက်အခြမ်း (Blue) နေရာချထားခြင်း
            if(team === 'red') {
                soldier.style.left = Math.floor(Math.random() * 40) + 'vw';
            } else {
                soldier.style.left = Math.floor(Math.random() * 40 + 55) + 'vw';
            }
            soldier.style.top = Math.floor(Math.random() * 50 + 15) + 'vh';

            // နာမည်စာတန်း ထည့်သွင်းခြင်း
            const nameLabel = document.createElement('div');
            nameLabel.classList.add('player-name');
            nameLabel.innerText = name;
            soldier.appendChild(nameLabel);

            container.appendChild(soldier);

            // ကစားသမားလေးများ ကွင်းလယ်သို့ တစ်ဦးနှင့်တစ်ဦး တိုက်ခိုက်ရန် ရွေ့လျားသွားမည့် လှုပ်ရှားမှုအတု
            setTimeout(() => {
                soldier.style.left = '48vw';
            }, 1000);
        }
    </script>

</body>
</html>
