<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok PUBG Squad War (Multi-Tester)</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #111411; color: white; font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; position: relative;
        }

        /* ချိန်ညှိမှုအကွက် */
        #setup-box { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; width: 85%; max-width: 340px;
            background: rgba(20, 20, 20, 0.95); border-radius: 10px; 
            border: 2px solid #ff9100; z-index: 999; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        input { padding: 12px; width: 85%; border-radius: 6px; border: none; font-size: 16px; margin-bottom: 12px; text-align: center; background: #fff; color: #000; }
        button.main-btn { padding: 12px; background: #ff9100; color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; width: 90%; cursor: pointer; margin-bottom: 10px; }
        #status { font-size: 14px; margin-top: 5px; margin-bottom: 15px; color: #ffeb3b; min-height: 20px; }
        
        /* စမ်းသပ်ရန် ခလုတ်အဖွဲ့ */
        .test-group { display: flex; flex-direction: column; gap: 8px; align-items: center; border-top: 1px dashed #555; padding-top: 12px; }
        .test-group label { font-size: 12px; color: #aaa; margin-bottom: 2px; }
        .test-btn { padding: 8px; background: #333; color: #ff9100; border: 1px solid #ff9100; border-radius: 4px; font-size: 12px; width: 90%; cursor: pointer; font-weight: bold; }
        .test-btn:hover { background: #ff9100; color: #000; }

        #battleground {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background-color: #1a221a;
            background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; overflow: hidden;
        }
        #center-line { position: absolute; left: 50%; width: 4px; height: 100%; background: rgba(233, 30, 99, 0.3); z-index: 2; border-left: 1px dashed #ff1744; }
        #game-header { position: absolute; top: 15px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px; color: #ff9100; text-shadow: 3px 3px 0px #000; }
        #score { font-size: 32px; font-weight: bold; margin-top: 5px; text-shadow: 2px 2px 4px black; }
        .bg-text { position: absolute; top: 40%; width: 50%; text-align: center; font-size: 35px; font-weight: bold; color: rgba(255,255,255,0.06); pointer-events: none; text-transform: uppercase; letter-spacing: 3px; }
        #left-text { left: 0; } #right-text { right: 0; }
        .soldier { position: absolute; width: 45px; height: 45px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; transition: left 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 10; border: 2px solid; box-shadow: 0 0 15px rgba(0,0,0,0.6); }
        .red-team { background: #ff1744; border-color: #ff5252; box-shadow: 0 0 12px #ff1744; }
        .blue-team { background: #2979ff; border-color: #448aff; box-shadow: 0 0 12px #2979ff; }
        .gun-icon { font-size: 12px; margin-top: 2px; }
        .muzzle-flash { position: absolute; width: 15px; height: 15px; background: #ffea00; border-radius: 50%; z-index: 15; box-shadow: 0 0 20px #ffea00; animation: flash 0.1s ease-out; }
        @keyframes flash { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-header">
        <h1>PUBG SQUAD WAR</h1>
        <div id="score"><span style="color:#ff1744">RED</span> <span id="red-score">0</span> - <span id="blue-score">0</span> <span style="color:#2979ff">BLUE</span></div>
    </div>

    <div id="setup-box">
        <input type="text" id="username-input" placeholder="TikTok Username ရိုက်ပါ..." value="min.zin907">
        <button class="main-btn" onclick="startFastConnection(document.getElementById('username-input').value)">CONNECT & START</button>
        
        <div id="status">အကောင့်နာမည်ရိုက်ပြီး စမ်းသပ်ပါ</div>

        <div class="test-group">
            <label> သို့မဟုတ် နာမည်ကြီး LIVE များဖြင့် စမ်းသပ်ရန် </label>
            <button class="test-btn" onclick="startFastConnection('tiktok_live_game')">စမ်းသပ်ရန် (၁) - tiktok_live_game</button>
            <button class="test-btn" onclick="startFastConnection('live_games_tiktok')">စမ်းသပ်ရန် (၂) - live_games_tiktok</button>
            <button class="test-btn" onclick="startFastConnection('interactive_game_live')">စမ်းသပ်ရန် (၃) - interactive_game_live</button>
        </div>
    </div>

    <div id="battleground">
        <div id="left-text" class="bg-text">RED SQUAD<br><span style="font-size:60px;color:#ff1744"></span></div>
        <div id="right-text" class="bg-text">BLUE SQUAD<br><span style="font-size:60px;color:#2979ff"></span></div>
        <div id="center-line"></div>
    </div>

    <script>
        const bg = document.getElementById('battleground');
        let scores = { red: 0, blue: 0 };
        let ws = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playGunSound(isExplosion) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(isExplosion ? 100 : 400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + (isExplosion ? 0.4 : 0.1));
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + (isExplosion ? 0.4 : 0.1));
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + (isExplosion ? 0.4 : 0.1));
            } catch (e) {}
        }

        function startFastConnection(username) {
            audioCtx.resume();
            username = username.trim();
            if(!username) return alert('Username မရှိပါ ချစ်ဆုံး');

            document.getElementById('username-input').value = username;
            document.getElementById('status').innerText = "@" + username + " ၏ LIVE ကို စစ်ဆေးနေပါသည်...";
            document.getElementById('status').style.color = '#ffeb3b';

            if (ws) { ws.close(); }
            ws = new WebSocket("wss://://wstiktok.com@" + username);

            ws.onopen = () => {
                document.getElementById('status').innerText = "ချိတ်ဆက်မှု အောင်မြင်ပါပြီ။ ဂိမ်းစတင်ပါတော့မည်!";
                document.getElementById('status').style.color = '#4caf50';
                setTimeout(() => { document.getElementById('setup-box').style.display = 'none'; }, 1200);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.event === 'gift') {
                        let team = 'blue';
                        if (data.giftName === 'Rose') { team = 'red'; }
                        spawnSoldier(data.uniqueId, team, data.count || 1);
                    }
                } catch (e) {}
            };

            ws.onclose = () => {
                document.getElementById('status').innerText = "@" + username + " သည် လက်ရှိတွင် LIVE မရှိသေးပါ။";
                document.getElementById('status').style.color = '#ffeb3b';
            };

            ws.onerror = () => {
                document.getElementById('status').innerText = "ချိတ်ဆက်မှု မအောင်မြင်ပါ။ အခြားခလုတ်တစ်ခုကို စမ်းကြည့်ပါ";
                document.getElementById('status').style.color = '#f44336';
            };
        }

        function spawnSoldier(name, team, count) {
            playGunSound(false);
            const soldier = document.createElement('div');
            soldier.className = `soldier ${team}-team`;
            soldier.innerHTML = `<span>${name.substring(0, 3).toUpperCase()}</span><span class="gun-icon"></span>`;
            const w = window.innerWidth; const h = window.innerHeight;
            const randomY = Math.random() * (h - 200) + 120;
            soldier.style.top = randomY + 'px';
            soldier.style.left = team === 'red' ? '-50px' : (w + 10) + 'px';
            bg.appendChild(soldier);

            setTimeout(() => { soldier.style.left = team === 'red' ? (w/2 - 60) + 'px' : (w/2 + 20) + 'px'; }, 50);

            setTimeout(() => {
                playGunSound(false);
                const flash = document.createElement('div');
                flash.className = 'muzzle-flash';
                flash.style.top = (randomY + 15) + 'px';
                flash.style.left = team === 'red' ? (w/2 - 15) + 'px' : (w/2 + 5) + 'px';
                bg.appendChild(flash);
                setTimeout(() => flash.remove(), 100);
                setTimeout(() => { soldier.style.left = team === 'red' ? (w + 20) + 'px' : '-60px'; }, 200);
            }, 900);

            setTimeout(() => {
                playGunSound(true);
                scores[team] += count;
                document.getElementById(`${team}-score`).innerText = scores[team];
                soldier.remove();
            }, 1900);
        }
    </script>
</body>
</html>
