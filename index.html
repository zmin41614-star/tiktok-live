<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Interactive Football Game</title>
    <style>
        /* အခြေခံ စခရင်အပြင်အဆင် */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b2414; /* မြက်ခင်းစိမ်းရင့်ရောင် နောက်ခံ */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /*  ဘောလုံးဂိမ်းကွင်းပြင်ကြီး (ဂိမ်းစခရင်) */
        #game-screen {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        /* ကွင်းလယ်မျဉ်းဖြူလိုင်း */
        .half-line {
            position: absolute;
            left: 50%;
            top: 0;
            width: 3px;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.6);
            transform: translateX(-50%);
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            z-index: 5;
        }

        .team-red { color: #ff3333; }
        .team-blue { color: #3366ff; }

        /*  စတင်ချိတ်ဆက်မည့် Setup Box (Username ရိုက်ရမည့်နေရာ) */
        #setup-box {
            position: absolute;
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ff9900;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            text-align: center;
            z-index: 10; /* ဂိမ်းကွင်းပြင်ရဲ့ အပေါ်မှာ ပေါ်နေစေရန် */
            transition: opacity 0.5s ease;
        }

        .setup-title {
            font-size: 26px;
            font-weight: bold;
            color: #ff9900;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .setup-subtitle {
            font-size: 13px;
            color: #aaaaaa;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #ff9900;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus { border-color: #ff9900; outline: none; }

        .btn-connect {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ff9900, #ff5500);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 85, 0, 0.3);
        }

        /* အောက်ခြေ Console စနစ်စာတန်း */
        .bottom-console {
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #00ffcc;
            font-size: 14px;
            text-align: center;
            z-index: 5;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!--  Setup Box (ချိတ်ဆက်ရန် နေရာ) -->
    <div id="setup-box">
        <div class="setup-title"> SQUAD WAR </div>
        <div class="setup-subtitle">TikTok Live Interactive System</div>
        
        <div class="input-group">
            <label for="tiktok-username">TikTok Username</label>
            <input type="text" id="tiktok-username" value="interactive_game_live" placeholder="@username">
        </div>
        
        <button class="btn-connect" onclick="connectToTikTokLive()">CONNECT & START</button>
    </div>

    <!--  ဘောလုံးဂိမ်းကွင်းပြင် (ဂိမ်းစခရင်) -->
    <div id="game-screen">
        <div class="half-line"></div>
        
        <!-- ရမှတ်ဘုတ် -->
        <div class="score-board">
            <span class="team-red">RED 0</span>
            <span>VS</span>
            <span class="team-blue">0 BLUE</span>
        </div>

        <!-- အောက်ခြေ အခြေအနေပြ စာတန်း -->
        <div class="bottom-console" id="console-text">
            [စနစ်] TikTok Live နှင့် ချိတ်ဆက်ရန် အဆင်သင့်ဖြစ်ပါပြီ...
        </div>
    </div>

    <script>
        // တိုက်ခိုက်ရေး နောက်ခံအသံဖိုင် (Battle Sound Effect)
        const battleAudio = new Audio('https://google.com');
        battleAudio.loop = true;

        function connectToTikTokLive() {
            const username = document.getElementById('tiktok-username').value.trim();
            const setupBox = document.getElementById('setup-box');
            const consoleText = document.getElementById('console-text');

            if (!username) {
                alert('ကျေးဇူးပြု၍ TikTok Username ကို ရိုက်ထည့်ပါ ချစ်ဆုံး။');
                return;
            }

            //  တိုက်ခိုက်ရေးအသံ စတင်ဖွင့်ခြင်း
            battleAudio.play().catch(e => console.log("Audio blocked"));

            //  [အရေးကြီးဆုံးအပိုင်း] Username မှန်ကန်စွာ ချိတ်ဆက်ပြီးပါက Setup Box ကို ဖျောက်လိုက်ခြင်း
            setupBox.style.display = 'none'; 

            // ဂိမ်းအောက်ခြေက စာတန်းကို Live တက်နေတဲ့ Username အဖြစ် ပြောင်းလဲပေးခြင်း
            consoleText.innerHTML = `[စနစ်] <strong>@${username}</strong> ၏ LIVE သို့ အောင်မြင်စွာ ချိတ်ဆက်ပြီးပါပြီ။ ဂိမ်းစတင်ပါပြီ။`;

            // Cloudflare Worker URL လမ်းကြောင်း (နောက်အဆင့်တွင် အသုံးချရန်)
            const workerUrl = "https://workers.dev";
        }
    </script>

</body>
</html>
