<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok PUBG Squad War (Official Fix)</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #111411; color: white; font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; position: relative;
        }
        #battleground { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: #1a221a; background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px); background-size: 40px 40px; overflow: hidden; }
        #center-line { position: absolute; left: 50%; width: 4px; height: 100%; background: rgba(233, 30, 99, 0.3); z-index: 2; border-left: 1px dashed #ff1744; }
        #game-header { position: absolute; top: 15px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #ff9100; text-shadow: 3px 3px 0px #000; }
        #score { font-size: 30px; font-weight: bold; margin-top: 5px; text-shadow: 2px 2px 4px black; }
        .bg-text { position: absolute; top: 30%; width: 50%; text-align: center; font-size: 32px; font-weight: bold; color: rgba(255,255,255,0.06); pointer-events: none; text-transform: uppercase; letter-spacing: 3px; }
        #left-text { left: 0; } #right-text { right: 0; }
        .soldier { position: absolute; width: 45px; height: 45px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; transition: left 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 10; border: 2px solid; box-shadow: 0 0 15px rgba(0,0,0,0.6); }
        .red-team { background: #ff1744; border-color: #ff5252; box-shadow: 0 0 12px #ff1744; }
        .blue-team { background: #2979ff; border-color: #448aff; box-shadow: 0 0 12px #2979ff; }
        .gun-icon { font-size: 12px; margin-top: 2px; }
        .muzzle-flash { position: absolute; width: 15px; height: 15px; background: #ffea00; border-radius: 50%; z-index: 15; box-shadow: 0 0 20px #ffea00; animation: flash 0.1s ease-out; }
        @keyframes flash { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        #chat-container { position: absolute; bottom: 15px; left: 5%; width: 90%; height: 130px; background: rgba(0, 0, 0, 0.8); border: 1px solid #ff9100; border-radius: 6px; z-index: 999; overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 5px; box-sizing: border-box; }
        .chat-msg { font-size: 12px; color: #fff; margin: 2px 5px; line-height: 1.4; text-shadow: 1px 1px 1px #000; }
        .chat-user { color: #ffeb3b; font-weight: bold; }
        .chat-gift { color: #ff1744; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-header">
        <h1>PUBG SQUAD WAR</h1>
        <div id="score"><span style="color:#ff1744">RED</span> <span id="red-score">0</span> - <span id="blue-score">0</span> <span style="color:#2979ff">BLUE</span></div>
    </div>

    <div id="battleground">
        <div id="left-text" class="bg-text">RED SQUAD<br><span style="font-size:50px;color:#ff1744"></span></div>
        <div id="right-text" class="bg-text">BLUE SQUAD<br><span style="font-size:50px;color:#2979ff"></span></div>
        <div id="center-line"></div>
    </div>

    <div id="chat-container">
        <div class="chat-msg"><span class="chat-user">[စနစ်]</span> အလိုအလျောက် စတင်ချိတ်ဆက်နေပါသည်...</div>
    </div>

    <script>
        const bg = document.getElementById('battleground');
        const chatBox = document.getElementById('chat-container');
        let scores = { red: 0, blue: 0 };
        let ws = null;

        // လက်ရှိ ထိုင်းမှာ တကယ် LIVE လွှင့်နေသော အကောင့်အမည်ဖြစ်ပါသည်
        const testUsername = "th_livegame"; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playGunSound(isExplosion) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(isExplosion ? 100 : 400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + (isExplosion ? 0.4 : 0.1));
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + (isExplosion ? 0.4 : 0.1));
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + (isExplosion ? 0.4 : 0.1));
            } catch (e) {}
        }

        function addChatMessage(htmlContent) {
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.innerHTML = htmlContent;
            chatBox.appendChild(msg);
            if (chatBox.children.length > 6) { chatBox.removeChild(chatBox.children); }
        }

        function initLiveConnection() {
            if (ws) { ws.close(); }
            
            // လိပ်စာကို ရိုးရိုးရှင်းရှင်းနှင့် အမှန်ကန်ဆုံး ပြင်ဆင်ထားပါသည်
            var serverUrl = "wss://://wstiktok.com@" + testUsername;
            ws = new WebSocket(serverUrl);

            ws.onopen = () => {
                chatBox.innerHTML = "";
                addChatMessage(`<span class="chat-user">[အောင်မြင်ပါပြီ]</span> @${testUsername} ၏ LIVE နှင့် တိုက်ရိုက်ချိတ်ဆက်မိပါပြီ။`);
            };

            ws.onmessage = (event) => {
                try {
                    audioCtx.resume();
                    const data = JSON.parse(event.data);
                    if (data.event === 'join') { addChatMessage(`<span class="chat-user">@${data.uniqueId}</span> ဝင်ရောက်လာပါပြီ `); }
                    if (data.event === 'chat') { addChatMessage(`<span class="chat-user">@${data.uniqueId}</span>: ${data.comment}`); }
                    if (data.event === 'gift') {
                        addChatMessage(`<span class="chat-user">@${data.uniqueId}</span> မှ <span class="chat-gift">${data.giftName} x${data.count}</span> ပေးပို့လိုက်ပါပြီ `);
                        let team = 'blue';
                        if (data.giftName === 'Rose') { team = 'red'; }
                        spawnSoldier(data.uniqueId, team, data.count || 1);
                    }
                } catch (e) {}
            };

            ws.onclose = () => {
                addChatMessage(`<span class="chat-user">[စနစ်]</span> LIVE ဆာဗာ ရှာဖွေနေပါသည်...`);
                setTimeout(initLiveConnection, 6000); 
            };

            ws.onerror = () => {
                addChatMessage(`<span class="chat-user">[အမှား]</span> လိုင်းပြန်လည်ချိတ်ဆက်နေပါသည်...`);
            };
        }

        function spawnSoldier(name, team, count) {
            playGunSound(false);
            const soldier = document.createElement('div');
            soldier.className = `soldier ${team}-team`;
            soldier.innerHTML = `<span>${name.substring(0, 3).toUpperCase()}</span><span class="gun-icon"></span>`;
            const w = window.innerWidth; const h = window.innerHeight;
            const randomY = Math.random() * (h - 260) + 100;
            soldier.style.top = randomY + 'px';
            soldier.style.left = team === 'red' ? '-50px' : (w + 10) + 'px';
            bg.appendChild(soldier);
            setTimeout(() => { soldier.style.left = team === 'red' ? (w/2 - 60) + 'px' : (w/2 + 20) + 'px'; }, 50);
            setTimeout(() => {
                playGunSound(false);
                const flash = document.createElement('div');
                flash.className = 'muzzle-flash';
                flash.style.top = (randomY + 15) + 'px';
                flash.style.left = team === 'red' ? (w/2 - 15) + 'px' : (w/2 + 5) + 'px';
                bg.appendChild(flash);
                setTimeout(() => flash.remove(), 100);
                setTimeout(() => { soldier.style.left = team === 'red' ? (w + 20) + 'px' : '-60px'; }, 200);
            }, 900);
            setTimeout(() => {
                playGunSound(true);
                scores[team] += count;
                document.getElementById(`${team}-score`).innerText = scores[team];
                soldier.remove();
            }, 1900);
        }

        window.onload = initLiveConnection;
    </script>
</body>
</html>
